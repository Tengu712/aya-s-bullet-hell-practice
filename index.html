<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <title>射命丸文の弾幕稽古</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
        }
        div#wrapper {
            position: relative;
            width: 1280px;
            height: 960px;
            margin: 0 auto;
            vertical-align: bottom;
        }
        canvas#main-canvas {
            width: 100%;
            height: 100%;
            vertical-align: bottom; 
        }
        label#fps-label {
            position: absolute;
            right: 0;
            bottom: 0;
            font-size: 30px;
            color: white;
        }
    </style>
</head>

<body>
    <div id="wrapper">
        <canvas id="main-canvas"></canvas>
        <label id="fps-label">00.0fps</label>
    </div>
    <script src="./js/index.js"></script>
</body>

</html>
